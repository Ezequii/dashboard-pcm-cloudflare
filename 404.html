<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="refresh" content="0; url=/" />
  <title>Redirecionando — Controle de Requisições PCM</title>
  <link rel="icon" type="image/png" href="/static/favicon.png" />
  <style>
    :root{font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#172033;background:#f6f8fa}
    body{min-height:100vh;margin:0;display:grid;place-items:center;padding:24px}
    main{width:min(460px,100%);padding:28px;border:1px solid #e4e7ec;border-radius:16px;background:#fff;box-shadow:0 12px 34px rgba(16,24,40,.08);text-align:center}
    strong{display:block;font-size:20px;margin-bottom:8px}
    p{margin:0 0 18px;color:#667085;line-height:1.5}
    a{display:inline-flex;min-height:42px;align-items:center;justify-content:center;padding:0 16px;border-radius:9px;background:#00629e;color:#fff;text-decoration:none;font-weight:700}
  </style>
  <script>
    (() => {
      const target = '/' + window.location.search + window.location.hash;
      window.location.replace(target);
    })();
  </script>
</head>
<body>
  <main>
    <strong>Página não encontrada</strong>
    <p>Você será redirecionado para o dashboard.</p>
    <a href="/">Voltar ao dashboard</a>
  </main>
</body>
</html>
