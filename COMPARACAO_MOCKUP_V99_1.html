  --font:&quot;Segoe UI Variable&quot;,&quot;Segoe UI&quot;,-apple-system,BlinkMacSystemFont,Roboto,Arial,sans-serif;
  --ease:cubic-bezier(.2,.8,.2,1);
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;
  min-height:100vh;
  font-family:var(--font);
  color:var(--ink);
  background:
    radial-gradient(circle at 0 0, rgba(0,98,158,.07), transparent 28%),
    radial-gradient(circle at 100% 0, rgba(35,160,103,.06), transparent 26%),
    linear-gradient(180deg,#fff 0%,#F7FAFB 38%,#EEF4F7 100%);
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  font-size:13px;
}
button,input,select{font:inherit}
button{border:0}
[hidden]{display:none!important}
.sr-only{position:absolute!important;width:1px!important;height:1px!important;overflow:hidden!important;clip:rect(0,0,0,0)!important;white-space:nowrap!important}

/* HEADER — igual nas duas abas */
.topbar{
  position:sticky;
  top:0;
  z-index:300;
  padding:12px 22px 13px;
  background:rgba(250,252,253,.96);
  border-bottom:1px solid #D9E4EB;
  backdrop-filter:blur(18px) saturate(160%);
  -webkit-backdrop-filter:blur(18px) saturate(160%);
  box-shadow:0 4px 22px rgba(16,24,40,.035);
}
.topbar::before{
  content:&quot;&quot;;
  position:absolute;
  inset:0 0 auto 0;
  height:3px;
  background:linear-gradient(90deg,var(--blue),var(--green) 62%,var(--yellow));
}
.topbar-row{
  width:calc(100vw - 44px);
  max-width:none;
  margin:0 auto;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
}
.topbar-row-main{min-height:54px}
.brand{
  display:flex;
  align-items:center;
  gap:16px;
  min-width:0;
}
.brand-logo-box{
  width:176px;
  height:42px;
  flex:0 0 auto;
  display:flex;
  align-items:center;
}
.brand-logo-box img{
  max-width:100%;
  max-height:100%;
  object-fit:contain;
  display:block;
}
.brand-copy-wrap{
  display:flex;
  align-items:center;
  gap:26px;
  min-width:0;
}
.brand-copy-wrap&gt;div:first-child{
  min-width:355px;
}
.brand h1{
  display:inline;
  margin:0;
  font-size:20px;
  line-height:1.05;
  font-weight:820;
  letter-spacing:-.04em;
  color:#111827;
}
.version-pill-v34{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  height:22px;
  padding:0 9px;
  margin-left:9px;
  border-radius:999px;
  background:#E9F5FC;
  border:1px solid #CFE6F3;
  color:var(--blue);
  font-size:10px;
  font-weight:850;
  letter-spacing:.06em;
  text-transform:uppercase;
  vertical-align:top;
}
.subtitle-top{
  margin:4px 0 0;
  color:#667085;
  font-size:12px;
  line-height:1.15;
  font-weight:650;
}

/* tabs */
.inline-tabs{
  display:flex;
  align-items:center;
  gap:10px;
  padding:4px;
  background:#F1F6F9;
  border:1px solid #DEE8EF;
  border-radius:20px;
}
.tab-btn{
  width:168px;
  height:48px;
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  justify-content:center;
  gap:2px;
  padding:8px 14px;
  border-radius:16px;
  background:transparent;
  color:#536273;
  cursor:pointer;
  transition:background .18s var(--ease), color .18s var(--ease), box-shadow .18s var(--ease);
}
.tab-btn span{
  font-size:13px;
  line-height:1.1;
  font-weight:850;
}
.tab-btn small{
  color:#8A98A8;
  font-size:10.5px;
  line-height:1.1;
  font-weight:700;
}
.tab-btn.active{
  background:#fff;
  color:var(--blue);
  box-shadow:0 10px 24px rgba(0,98,158,.11);
}
.tab-btn.active small{color:#728196}

/* actions */
.top-actions{
  display:flex;
  align-items:center;
  gap:10px;
  flex:0 0 auto;
}
.clock,.btn{
  height:42px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  border-radius:16px;
  padding:0 14px;
  border:1px solid #DDE6ED;
  background:#fff;
  color:#425166;
  text-decoration:none;
  font-size:12.5px;
  font-weight:800;
  white-space:nowrap;
  cursor:pointer;
  box-shadow:0 8px 18px rgba(16,24,40,.035);
  transition:transform .18s var(--ease), box-shadow .18s var(--ease), border-color .18s var(--ease), background .18s var(--ease);
}
.clock{
  background:#F7FAFC;
  color:#344054;
}
.btn:hover,.clock:hover{
  transform:translateY(-1px);
  border-color:#C9D9E4;
  box-shadow:0 12px 25px rgba(16,24,40,.06);
}
.btn-primary{
  background:linear-gradient(135deg,#0678B8,var(--blue));
  border-color:transparent;
  color:#fff;
  box-shadow:0 12px 25px rgba(0,98,158,.18);
}
.btn-soft{background:#fff}
.btn-small{height:38px;padding:0 12px;border-radius:14px}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none}

/* Export menu */
.export-menu{position:relative}
.export-dropdown{
  position:absolute;
  top:48px;
  right:0;
  min-width:170px;
  padding:8px;
  border-radius:16px;
  border:1px solid #DDE6ED;
  background:#fff;
  box-shadow:0 22px 55px rgba(16,24,40,.14);
  z-index:900;
}
.export-item{
  width:100%;
  height:38px;
  text-align:left;
  padding:0 12px;
  border-radius:12px;
  background:transparent;
  color:#344054;
  font-weight:750;
  cursor:pointer;
}
.export-item:hover{background:#F3F7FA}

/* top filters */
.topbar-row-filters-v40{
  margin-top:12px;
  display:grid;
  grid-template-columns:minmax(0,1fr) auto;
  align-items:center;
  gap:16px;
}
.top-filters-v40{
  display:grid!important;
  grid-template-columns:repeat(3,minmax(210px,310px));
  gap:12px!important;
}
.smart-select{position:relative;min-width:0;z-index:50}
.smart-select.open-select{z-index:800}
.smart-trigger{
  width:100%;
  height:46px;
  display:grid;
  grid-template-columns:1fr auto;
  grid-template-areas:&quot;title caret&quot; &quot;value caret&quot;;
  align-items:center;
  text-align:left;
  padding:7px 14px;
  border-radius:16px;
  border:1px solid #D8E3EA;
  background:#fff;
  cursor:pointer;
  box-shadow:0 8px 18px rgba(16,24,40,.025);
}
.smart-trigger:hover,.smart-trigger[aria-expanded=&quot;true&quot;]{
  border-color:#BFD4E1;
}
.smart-title{
  grid-area:title;
  color:#667085;
  font-size:9.5px;
  line-height:1;
  font-weight:850;
  letter-spacing:.08em;
  text-transform:uppercase;
}
.smart-value{
  grid-area:value;
  margin-top:3px;
  color:#111827;
  font-size:12.8px;
  line-height:1.05;
  font-weight:800;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.smart-caret{
  grid-area:caret;
  color:#9AA6B2;
  padding-left:10px;
}
.meta-chip-v40{
  height:42px;
  display:inline-flex;
  align-items:center;
  padding:0 6px;
  color:#344054;
  font-size:13px;
  font-weight:650;
  white-space:nowrap;
}

/* popover */
.option-popover{
  position:absolute;
  top:52px;
  left:0;
  right:0;
  display:none;
  z-index:900;
  padding:10px;
  border-radius:18px;
  border:1px solid #D8E3EA;
  background:#fff;
  box-shadow:0 25px 60px rgba(16,24,40,.16);
}
.option-popover.open{display:block}
.popover-search input{
  width:100%;
  height:38px;
  border-radius:13px;
  border:1px solid #DEE7EE;
  background:#F8FAFC;
  padding:0 11px;
  outline:0;
}
.popover-search input:focus{
  background:#fff;
  border-color:#91C8E8;
  box-shadow:0 0 0 4px rgba(0,98,158,.08);
}
.option-tools{display:flex;gap:8px;margin:9px 0}
.option-tools button{
  height:30px;
  padding:0 10px;
  border-radius:999px;
  background:#EFF6FA;
  color:var(--blue);
  font-size:11px;
  font-weight:850;
  cursor:pointer;
}
.option-list{max-height:260px;overflow:auto}
.option-item{
  width:100%;
  min-height:36px;
  display:grid;
  grid-template-columns:1fr 22px;
  align-items:center;
  gap:8px;
  padding:8px 10px;
  border-radius:12px;
  background:transparent;
  text-align:left;
  color:#344054;
  font-size:12px;
  font-weight:700;
  cursor:pointer;
}
.option-item:hover{background:#F5F8FA}
.option-item.selected{background:#EAF5FB;color:var(--blue)}
.option-item span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.option-item i{font-style:normal;text-align:center;color:var(--green);font-weight:900}
.option-count,.option-empty,.empty-state{padding:16px;text-align:center;color:#98A2B3}

/* quick chips */
.topbar-row-quick{
  margin-top:12px;
  justify-content:flex-start;
}
.quick-chip-row{
  display:flex;
  align-items:center;
  flex-wrap:wrap;
  gap:10px;
}
.quick-chip{
  height:40px;
  padding:0 16px;
  border-radius:999px;
  border:1px solid #DDE7EE;
  background:#fff;
  color:#344054;
  font-size:12.5px;
  font-weight:850;
  cursor:pointer;
  box-shadow:0 8px 18px rgba(16,24,40,.035);
  transition:background .18s var(--ease), color .18s var(--ease), transform .18s var(--ease), border-color .18s var(--ease);
}
.quick-chip:hover{transform:translateY(-1px);border-color:#C9D9E4}
.quick-chip.active{
  background:linear-gradient(135deg,#0A79B5,var(--blue));
  color:#fff;
  border-color:transparent;
}
.active-filters-top{display:none!important}

/* Drawer */
.drawer-backdrop{
  position:fixed;
  inset:0;
  z-index:700;
  background:rgba(15,23,42,.28);
  opacity:0;
  transition:opacity .18s ease;
}
.drawer-backdrop.show{opacity:1}
.filter-drawer{
  position:fixed;
  z-index:800;
  top:0;
  right:0;
  width:min(380px,92vw);
  height:100vh;
  transform:translateX(105%);
  transition:transform .22s var(--ease);
  background:#fff;
  border-left:1px solid #DDE7EE;
  box-shadow:0 30px 80px rgba(16,24,40,.18);
  padding:18px;
}
.filter-drawer.open{transform:translateX(0)}
.drawer-head{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
  margin-bottom:18px;
}
.drawer-head strong{font-size:18px}
.drawer-head span,.drawer-helper{display:block;margin-top:4px;color:#667085;font-size:12.5px;line-height:1.35}
.drawer-close{
  width:36px;height:36px;border-radius:12px;background:#F3F7FA;color:#344054;font-size:24px;cursor:pointer;
}
.drawer-body{display:grid;gap:12px}

/* page */
.page{
  width:calc(100vw - 44px);
  margin:0 auto;
  padding:18px 0 28px;
}
.footer-credit{display:none}

/* KPI cards */
.kpi-grid{
  display:grid;
  grid-template-columns:repeat(6,minmax(0,1fr));
  gap:16px;
  margin-bottom:14px;
}
.kpi-card{
  position:relative;
  min-height:136px;
  padding:18px;
  border-radius:24px;
  background:#fff;
  border:1px solid #E1EAF0;
  box-shadow:var(--shadow);
  overflow:hidden;
  transition:transform .2s var(--ease), box-shadow .2s var(--ease), border-color .2s var(--ease);
}
.kpi-card:hover{
  transform:translateY(-2px);
  box-shadow:var(--shadow2);
  border-color:#CFE0EA;
}
.kpi-card::before{display:none}
.kpi-icon,.farol-dot{
  width:44px;
  height:44px;
  display:grid;
  place-items:center;
  margin-bottom:12px;
  border-radius:16px;
  font-size:13px;
  font-weight:900;
}
.kpi-pendente .kpi-icon{background:#E9F5FC;color:var(--blue)}
.kpi-pendencias .kpi-icon{background:#F0EDFF;color:#7659F7}
.kpi-concluido .kpi-icon{background:#EAF8F1;color:var(--green)}
.kpi-atraso .kpi-icon{background:#EEF3F7;color:#667085}
.kpi-sla .kpi-icon{background:#FFF4DE;color:#B97800}
.farol-dot{background:#FDECEC;position:relative}
.farol-dot::after{content:&quot;&quot;;width:14px;height:14px;border-radius:50%;background:var(--red);box-shadow:0 0 0 7px rgba(211,47,47,.10)}
.kpi-copy span{
  display:block;
  color:#667085;
  font-size:11.5px;
  font-weight:850;
  letter-spacing:.04em;
  text-transform:uppercase;
}
.kpi-copy strong{
  display:block;
  margin:6px 0 3px;
  color:#111827;
  font-size:28px;
  line-height:1.02;
  font-weight:850;
  letter-spacing:-.055em;
  white-space:nowrap;
}
.kpi-pendente .kpi-copy strong,.kpi-sla .kpi-copy strong{color:var(--blue)}
.farol-card-v33 .kpi-copy strong{color:var(--red)}
.kpi-copy small{
  display:block;
  color:#7E8A99;
  font-size:12px;
  line-height:1.25;
  font-weight:650;
}

/* executive comment and base title */
.executive-comment-v33,.base-commandbar-v36{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:18px;
  min-height:58px;
  padding:14px 18px;
  margin-bottom:14px;
  border-radius:22px;
  background:#fff;
  border:1px solid #E1EAF0;
  box-shadow:var(--shadow);
}
.executive-comment-v33{justify-content:flex-start}
.comment-label,.base-title-v36 span{
  height:32px;
  display:inline-flex;
  align-items:center;
  padding:0 11px;
  border-radius:11px;
  background:#EAF5FB;
  color:var(--blue);
  font-size:11px;
  font-weight:850;
  letter-spacing:.06em;
  text-transform:uppercase;
  white-space:nowrap;
}
.executive-comment-v33 p{
  margin:0;
  color:#172033;
  font-size:14.5px;
  line-height:1.35;
  font-weight:760;
}
.base-title-v36{
  display:flex;
  flex-direction:column;
  gap:4px;
}
.base-title-v36 span{width:max-content}
.base-title-v36 strong{
  color:#111827;
  font-size:20px;
  line-height:1.05;
  font-weight:850;
  letter-spacing:-.04em;
}
.base-title-v36 small{
  color:#667085;
  font-size:12.5px;
  font-weight:650;
}
.base-legend-v36{
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
}
.base-legend-v36 span{
  height:32px;
  display:inline-flex;
  align-items:center;
  padding:0 12px;
  border-radius:999px;
  background:#F8FAFC;
  border:1px solid #E1EAF0;
  color:#536273;
  font-size:11.5px;
  font-weight:800;
}
.base-legend-v36 b{
  width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:7px;
}
.base-legend-v36 span:nth-child(1) b{background:var(--red)}
.base-legend-v36 span:nth-child(2) b{background:var(--amber)}
.base-legend-v36 span:nth-child(3) b{background:var(--green)}

/* cockpit */
.cockpit-grid-v33{
  display:grid;
  grid-template-columns:minmax(420px,.98fr) minmax(520px,1.02fr);
  gap:16px;
  margin-bottom:14px;
}
.chart-card{
  min-height:350px;
  border-radius:24px;
  background:#fff;
  border:1px solid #E1EAF0;
  box-shadow:var(--shadow);
  overflow:hidden;
}
.chart-head{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:14px;
  min-height:60px;
  padding:16px 18px 12px;
  border-bottom:1px solid #EEF3F6;
}
.chart-head::before{
  content:&quot;&quot;;
  width:5px;
  align-self:stretch;
  border-radius:999px;
  background:var(--blue2);
  order:-1;
}
.chart-head h3{
  margin:0;
  color:#111827;
  font-size:15px;
  line-height:1.08;
  font-weight:850;
  letter-spacing:-.03em;
}
.chart-head span{
  color:#7E8A99;
  font-size:11px;
  font-weight:760;
}

/* Process cards */
.process-grid{display:grid}
.process-v33,#processCards{
  grid-template-columns:1fr;
  gap:12px;
  padding:14px 16px 16px;
}
.process-card{
  --stage:var(--blue);
  position:relative;
  min-height:82px;
  padding:15px 18px 18px;
  border-radius:18px;
  background:#FBFDFE;
  border:1px solid #E5EDF2;
  overflow:hidden;
  cursor:pointer;
  transition:transform .18s var(--ease), border-color .18s var(--ease), background .18s var(--ease);
}
.process-card:hover{transform:translateY(-1px);background:#fff;border-color:#CFE0EA}
.process-card.active{box-shadow:inset 0 0 0 2px var(--stage)}
.process-card::before{
  content:&quot;&quot;;
  position:absolute;
  left:18px;right:18px;bottom:10px;
  height:4px;
  border-radius:999px;
  background:var(--stage);
}
.stage-red{--stage:var(--red)!important}
.stage-amber{--stage:var(--amber)!important}
.stage-blue{--stage:var(--blue)!important}
.stage-green{--stage:var(--green)!important}
.process-icon{display:none}
.process-card .stage{
  color:#667085;
  font-size:11px;
  line-height:1;
  font-weight:850;
  letter-spacing:.06em;
  text-transform:uppercase;
}
.process-card .num{
  margin:8px 0 6px;
  color:#111827;
  font-size:23px;
  line-height:1;
  font-weight:850;
  letter-spacing:-.04em;
}
.process-foot{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  color:#667085;
  font-size:11px;
  font-weight:700;
}
.process-foot strong{
  color:#111827;
  font-weight:850;
  white-space:nowrap;
}
.stage-critical-badge{
  position:absolute;
  right:14px;
  bottom:14px;
  padding:4px 9px;
  border-radius:999px;
  background:#FDECEC;
  border:1px solid #F7C8C8;
  color:var(--red);
  font-size:10px;
  font-weight:850;
}

/* priorities */
.priority-list-v33{
  display:grid;
  gap:12px;
  padding:14px 16px 16px;
}
.priority-row-v33{
  min-height:58px;
  display:grid;
  grid-template-columns:40px minmax(0,1fr) auto auto;
  gap:12px;
  align-items:center;
  padding:10px 12px;
  border-radius:18px;
  background:#FBFDFE;
  border:1px solid #E5EDF2;
}
.priority-rank{
  width:32px;height:32px;border-radius:12px;display:grid;place-items:center;background:#E8F5FC;color:var(--blue);font-weight:900
}
.priority-main strong{display:block;color:#111827;font-weight:850}
.priority-main span{display:block;margin-top:2px;color:#667085;font-size:11px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.priority-meta{text-align:right}
.priority-meta b{display:block;color:var(--blue);font-weight:850;white-space:nowrap}
.priority-meta span{display:block;margin-top:2px;color:var(--red);font-size:11px;font-weight:850;white-space:nowrap}
.priority-owner{
  height:28px;
  display:inline-flex;
  align-items:center;
  padding:0 10px;
  border-radius:999px;
  background:#fff;
  border:1px solid #DDE7EE;
  color:#344054;
  font-size:11px;
  font-weight:800;
}

/* action */
.action-now-v33{
  display:grid;
  grid-template-columns:190px minmax(0,1fr) 230px;
  gap:14px;
  align-items:stretch;
  padding:16px;
  border-radius:24px;
  background:#fff;
  border:1px solid #E1EAF0;
  box-shadow:var(--shadow);
}
.action-title-v33{
  display:flex;
  flex-direction:column;
  justify-content:center;
  border-right:1px solid #EEF3F6;
  padding-right:14px;
}
.action-title-v33 strong{font-size:18px;font-weight:850;color:#111827}
.action-title-v33 span{margin-top:4px;color:#667085;font-weight:650}
.action-list-v33{
  display:grid;
  grid-template-columns:repeat(4,minmax(0,1fr));
  gap:12px;
}
.action-card-v33{
  min-height:102px;
  padding:13px 14px;
  border-radius:18px;
  background:#FBFDFE;
  border:1px solid #E5EDF2;
  text-align:left;
  cursor:pointer;
  overflow:hidden;
}
.action-card-v33 span{
  display:block;
  color:#667085;
  font-size:10.5px;
  font-weight:850;
  letter-spacing:.06em;
  text-transform:uppercase;
}
.action-card-v33 strong{
  display:block;
  margin-top:4px;
  color:#111827;
  font-size:12.5px;
  font-weight:850;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.action-card-v33 em{
  display:block;
  margin-top:2px;
  color:var(--blue);
  font-size:22px;
  line-height:1;
  font-weight:850;
  font-style:normal;
  letter-spacing:-.04em;
}
.action-card-v33.warn em{color:#B97800}
.action-card-v33.danger em,.action-card-v33.old em{color:var(--red)}
.action-card-v33 small{
  display:inline-flex;
  align-items:center;
  max-width:100%;
  height:24px;
  margin-top:8px;
  padding:0 8px;
  border-radius:999px;
  background:#fff;
  border:1px solid #DDE7EE;
  color:#667085;
  font-size:10.5px;
  font-weight:800;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.owners-mini-v33{
  display:flex;
  flex-direction:column;
  justify-content:center;
  gap:8px;
  padding-left:14px;
  border-left:1px solid #EEF3F6;
}
.owners-mini-v33 strong{
  color:#667085;
  font-size:12px;
  font-weight:850;
  letter-spacing:.06em;
  text-transform:uppercase;
}
.owners-list-v33,.owners-list-v33&gt;div{display:grid;gap:7px}
.owner-row-v33,.owner-row{
  min-height:30px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  padding:0 10px;
  border-radius:12px;
  background:#FBFDFE;
  border:1px solid #E5EDF2;
  color:#344054;
  font-size:11px;
  font-weight:750;
}
.owner-row-v33 b,.owner-row b{color:var(--blue);font-weight:850}

/* base stage cards */
#processCardsBase{
  grid-template-columns:repeat(4,minmax(0,1fr));
  gap:12px;
  margin-bottom:12px;
  padding:0;
}
#processCardsBase .process-card{
  background:#fff;
  min-height:86px;
  box-shadow:var(--shadow);
  border-color:#E1EAF0;
}

/* table */
.table-card{
  border-radius:24px;
  background:#fff;
  border:1px solid #E1EAF0;
  box-shadow:var(--shadow);
  overflow:hidden;
}
.table-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:18px;
  padding:18px;
  border-bottom:1px solid #EEF3F6;
}
.table-head h3{
  margin:0;
  color:#111827;
  font-size:22px;
  line-height:1;
  font-weight:850;
  letter-spacing:-.04em;
}
.table-head p{
  margin:6px 0 0;
  color:#667085;
  font-size:12.5px;
  font-weight:800;
}
.leader-table-note{
  display:block;
  margin-top:6px;
  color:#8A98A8;
  font-size:12px;
  font-weight:650;
}
.table-tools{
  display:flex;
  align-items:end;
  justify-content:flex-end;
  gap:10px;
  flex-wrap:wrap;
}
.table-search{
  display:grid;
  gap:6px;
  min-width:430px;
}
.table-search span,.pager label,.advanced-search label span{
  color:#667085;
  font-size:10px;
  font-weight:850;
  letter-spacing:.08em;
  text-transform:uppercase;
}
.table-search input,select,.advanced-search input{
  height:42px;
  border-radius:15px;
  border:1px solid #DDE7EE;
  background:#fff;
  outline:0;
  padding:0 12px;
  color:#111827;
}
.table-search input:focus,select:focus,.advanced-search input:focus{
  border-color:#91C8E8;
  box-shadow:0 0 0 4px rgba(0,98,158,.08);
}
.advanced-search{
  display:flex;
  align-items:end;
  gap:10px;
  padding:12px;
  border-radius:18px;
  background:#F8FAFC;
  border:1px solid #E1EAF0;
}
.advanced-search label{display:grid;gap:6px}
.pager{
  display:flex;
  align-items:center;
  gap:8px;
}
.pager select{width:78px}
#pageInfo{min-width:54px;text-align:center;font-weight:850}
.table-wrap{
  max-height:calc(100vh - 295px);
  overflow:auto;
  background:#fff;
}
table{
  width:100%;
  min-width:1280px;
  border-collapse:separate;
  border-spacing:0;
}
thead th{
  position:sticky;
  top:0;
  z-index:5;
  padding:13px 13px;
  background:#F7FAFC;
  border-bottom:1px solid #E1EAF0;
  color:#536273;
  text-align:left;
  cursor:pointer;
  white-space:nowrap;
}
thead th:hover,thead th.active-sort{
  background:#EEF8FC;
  color:var(--blue);
}
.th-label{display:flex;flex-direction:column;gap:2px;line-height:1.05}
.th-main{font-size:12px;font-weight:850}
.th-sub{font-size:10.5px;font-weight:650;color:#98A2B3}
.sort-icon{float:right;color:#98A2B3;font-size:10px;margin-left:6px}
tbody td{
  padding:12px 13px;
  border-bottom:1px solid #EEF3F6;
  color:#344054;
  font-size:12.5px;
  vertical-align:middle;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  max-width:250px;
}
tbody tr:nth-child(even){background:#FCFDFE}
tbody tr:hover{background:#F4FAFD}
.empty-dash{color:#98A2B3}

/* badges/cells */
.tag-etapa,.delay-badge,.sla-badge,.owner-pill,.delay-range,.orcamento-pill,.date-chip{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:28px;
  padding:0 11px;
  border-radius:999px;
  font-size:11px;
  font-weight:850;
  white-space:nowrap;
}
.tag-etapa{min-width:104px;text-transform:uppercase;letter-spacing:.03em}
.tag-etapa.stage-red,.stage-red .tag-etapa{background:#FDECEC;color:var(--red);border:1px solid #F7C8C8}
.tag-etapa.stage-amber,.stage-amber .tag-etapa{background:#FFF6DF;color:#9A6500;border:1px solid #F9DE94}
.tag-etapa.stage-blue,.stage-blue .tag-etapa{background:#EAF5FB;color:var(--blue);border:1px solid #CFE6F3}
.tag-etapa.stage-green,.stage-green .tag-etapa{background:#EAF8F1;color:var(--green);border:1px solid #CAEBD9}
.delay-badge{background:#EEF8F1;color:#167249;border:1px solid #CDEBD9}
.delay-badge.attention{background:#FFF6DF;color:#9A6500;border-color:#F8DD95}
.delay-badge.critical,.delay-badge.very-critical{background:#FDECEC;color:var(--red);border-color:#F7C8C8}
.sla-badge.ok,.sla-badge.done{background:#EAF8F1;color:#167249;border:1px solid #CAEBD9}
.sla-badge.attention{background:#FFF6DF;color:#9A6500;border:1px solid #F8DD95}
.sla-badge.critical{background:#FDECEC;color:var(--red);border:1px solid #F7C8C8}
.owner-pill,.delay-range{background:#F8FAFC;border:1px solid #DDE7EE;color:#344054}
.orcamento-pill{background:#EAF5FB;color:var(--blue)}
.date-chip{background:#F8FAFC;border:1px solid #DDE7EE;color:#344054}
.date-chip.pending,.date-chip.missing{background:#FDECEC;color:var(--red);border-color:#F7C8C8}
.money-cell{font-weight:850;color:var(--blue)}
.code-cell{font-weight:750;color:#344054}
.supplier-text,.person-text{font-weight:650}
.table-hint{margin:0;padding:11px 18px;color:#98A2B3;font-size:11.5px;background:#FBFDFE;border-top:1px solid #EEF3F6}

/* login */
.login-page{min-height:100vh;display:grid;place-items:center;padding:24px;background:linear-gradient(180deg,#fff,#EEF4F7)}
.login-card{width:min(430px,100%);background:#fff;border:1px solid #E1EAF0;border-radius:28px;box-shadow:var(--shadow2);padding:30px}
.login-logo{width:210px;height:50px;margin-bottom:18px;display:flex;align-items:center}
.login-logo img{max-width:100%;max-height:100%}
.login-card h1{margin:0 0 8px;font-size:25px;letter-spacing:-.04em}
.login-card p{margin:0 0 8px;color:#667085}
.login-card form{display:grid;gap:10px;margin-top:20px}
.login-card label{font-size:11px;font-weight:850;color:#667085;text-transform:uppercase;letter-spacing:.06em}
.login-card input{height:44px;border-radius:15px;border:1px solid #DDE7EE;padding:0 12px;outline:0;background:#F8FAFC}
.login-card input:focus{background:#fff;border-color:#91C8E8;box-shadow:0 0 0 4px rgba(0,98,158,.08)}
.btn-full{width:100%;margin-top:8px}
.error{background:#FDECEC;border:1px solid #F7C8C8;color:#9B1C1C;border-radius:13px;padding:10px 12px;margin-top:14px;font-weight:750}

/* toast/loading */
.toast{
  position:fixed;
  right:22px;
  bottom:22px;
  z-index:1200;
  max-width:390px;
  opacity:0;
  transform:translateY(8px);
  pointer-events:none;
  transition:.18s ease;
  background:#111827;
  color:#fff;
  padding:12px 14px;
  border-radius:15px;
  box-shadow:0 22px 55px rgba(16,24,40,.20);
  font-weight:750;
}
.toast.show{opacity:1;transform:translateY(0)}
.toast.err{background:#9B1C1C}
.loading .page{cursor:progress}

/* responsive */
@media(max-width:1280px){
  .topbar-row-main{align-items:flex-start;flex-direction:column}
  .brand-copy-wrap{display:block}
  .inline-tabs{margin-top:10px}
  .topbar-row-filters-v40{grid-template-columns:1fr}
  .top-filters-v40{grid-template-columns:repeat(2,minmax(180px,1fr))}
  .kpi-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
  .cockpit-grid-v33{grid-template-columns:1fr}
  .action-now-v33{grid-template-columns:1fr}
  .action-title-v33,.owners-mini-v33{border:0;padding:0}
  .action-list-v33{grid-template-columns:repeat(2,minmax(0,1fr))}
  #processCardsBase{grid-template-columns:repeat(2,minmax(0,1fr))}
  .table-head{align-items:flex-start;flex-direction:column}
  .table-tools{justify-content:flex-start}
  .table-search{min-width:min(430px,100%)}
}
@media(max-width:760px){
  .topbar{padding:10px 12px}
  .topbar-row,.page{width:calc(100vw - 24px)}
  .brand{align-items:flex-start;flex-direction:column}
  .brand-logo-box{width:145px}
  .brand-copy-wrap&gt;div:first-child{min-width:0}
  .top-actions{display:none}
  .top-filters-v40,.kpi-grid,#processCardsBase{grid-template-columns:1fr}
  .action-list-v33{grid-template-columns:1fr}
  .quick-chip{height:38px;padding:0 13px}
  .table-wrap{max-height:68vh}
}
@media print{
  .no-print,.top-actions,.table-hint{display:none!important}
  .topbar{position:static}
  .page{padding:8px}
  .kpi-card,.process-card,.chart-card,.table-card{box-shadow:none!important}
  table{font-size:10px;min-width:0}
  thead th,tbody td{padding:6px}
}
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation:none!important;transition:none!important;scroll-behavior:auto!important}
}


/* =========================================================
   v44 — Premium Polish
   Mantém CSS limpo da v43 e refina acabamento visual
   ========================================================= */

body.v44-polish{
  --blue:#006DA8;
  --blue2:#00A3E0;
  --green:#1FA66A;
  --ink:#0D1726;
  --text:#243246;
  --muted:#657386;
  --muted2:#94A3B4;
  --line:#DCE7EE;
  --card:#FFFFFF;
  --bg:#F4F8FA;
  --shadow:0 10px 28px rgba(15,23,42,.045);
  --shadow2:0 20px 48px rgba(15,23,42,.075);
  background:
    radial-gradient(circle at 4% 0%, rgba(0,109,168,.085), transparent 30%),
    radial-gradient(circle at 92% 4%, rgba(31,166,106,.07), transparent 28%),
    linear-gradient(180deg,#FFFFFF 0%,#F7FAFC 35%,#EEF5F8 100%);
}

/* header mais elegante e menos pesado */
body.v44-polish .topbar{
  padding:11px 22px 12px;
  background:rgba(252,253,254,.965);
  border-bottom:1px solid rgba(209,224,234,.92);
  box-shadow:0 8px 28px rgba(15,23,42,.04);
}
body.v44-polish .topbar::before{
  height:3px;
  background:linear-gradient(90deg,#006DA8 0%,#16A36F 54%,#F5B233 78%,#E7EEF3 100%);
}
body.v44-polish .brand-logo-box{
  width:184px;
  height:44px;
}
body.v44-polish .brand h1{
  font-size:20.5px;
  letter-spacing:-.045em;
}
body.v44-polish .subtitle-top{
  color:#5F6F83;
}
body.v44-polish .version-pill-v34{
  background:linear-gradient(180deg,#EEF8FE,#E7F3FA);
  border-color:#CAE4F2;
  color:#006DA8;
}

/* abas com cara de produto */
body.v44-polish .inline-tabs{
  padding:5px;
  background:rgba(242,247,250,.95);
  border:1px solid #DCE8EF;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.8);
}
body.v44-polish .tab-btn{
  height:50px;
  border-radius:17px;
}
body.v44-polish .tab-btn.active{
  box-shadow:
    0 10px 25px rgba(0,109,168,.12),
    inset 0 1px 0 rgba(255,255,255,.9);
}

/* botões */
body.v44-polish .btn,
body.v44-polish .clock{
  border-color:#DCE7EE;
  box-shadow:0 7px 18px rgba(15,23,42,.035);
}
body.v44-polish .btn-primary{
  background:linear-gradient(135deg,#007AB8,#006DA8);
  box-shadow:0 10px 24px rgba(0,109,168,.20);
}

/* filtros */
body.v44-polish .smart-trigger{
  background:linear-gradient(180deg,#FFFFFF,#FAFCFD);
  border-color:#D7E3EB;
}
body.v44-polish .smart-trigger:hover,
body.v44-polish .smart-trigger[aria-expanded=&quot;true&quot;]{
  border-color:#AED2E8;
  box-shadow:0 0 0 4px rgba(0,109,168,.065);
}
body.v44-polish .quick-chip{
  box-shadow:0 7px 18px rgba(15,23,42,.035);
}
body.v44-polish .quick-chip.active{
  background:linear-gradient(135deg,#007AB8,#006DA8);
}

/* KPIs: acabamento tipo card premium */
body.v44-polish .kpi-grid{
  gap:17px;
}
body.v44-polish .kpi-card{
  min-height:142px;
  border-radius:26px;
  background:
    linear-gradient(180deg,#FFFFFF 0%,#FCFDFE 100%);
  border:1px solid rgba(220,231,238,.96);
  box-shadow:
    0 1px 0 rgba(255,255,255,.9),
    0 13px 30px rgba(15,23,42,.045);
}
body.v44-polish .kpi-card::after{
  content:&quot;&quot;;
  position:absolute;
  inset:0;
  pointer-events:none;
  background:linear-gradient(135deg,rgba(255,255,255,.72),rgba(255,255,255,0) 45%);
}
body.v44-polish .kpi-icon,
body.v44-polish .farol-dot{
  width:46px;
  height:46px;
  border-radius:17px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.72);
}
body.v44-polish .kpi-copy strong{
  font-size:30px;
  color:#0E1726;
}
body.v44-polish .kpi-copy span{
  color:#617085;
}
body.v44-polish .kpi-copy small{
  color:#8795A6;
}

/* cada KPI com um detalhe leve no canto */
body.v44-polish .kpi-pendente{
  background:
    radial-gradient(circle at 92% 16%, rgba(0,109,168,.09), transparent 34%),
    linear-gradient(180deg,#FFFFFF,#FCFDFE);
}
body.v44-polish .kpi-pendencias{
  background:
    radial-gradient(circle at 92% 16%, rgba(122,89,247,.085), transparent 34%),
    linear-gradient(180deg,#FFFFFF,#FCFDFE);
}
body.v44-polish .kpi-concluido{
  background:
    radial-gradient(circle at 92% 16%, rgba(31,166,106,.09), transparent 34%),
    linear-gradient(180deg,#FFFFFF,#FCFDFE);
}
body.v44-polish .kpi-atraso{
  background:
    radial-gradient(circle at 92% 16%, rgba(100,116,139,.09), transparent 34%),
    linear-gradient(180deg,#FFFFFF,#FCFDFE);
}
body.v44-polish .kpi-sla{
  background:
    radial-gradient(circle at 92% 16%, rgba(242,169,0,.13), transparent 34%),
    linear-gradient(180deg,#FFFFFF,#FCFDFE);
}
body.v44-polish .farol-card-v33{
  background:
    radial-gradient(circle at 92% 16%, rgba(211,47,47,.12), transparent 35%),
    linear-gradient(180deg,#FFFFFF,#FCFDFE);
}

/* leitura rápida */
body.v44-polish .executive-comment-v33,
body.v44-polish .base-commandbar-v36{
  border-radius:24px;
  background:
    linear-gradient(180deg,#FFFFFF,#FCFDFE);
  border:1px solid rgba(220,231,238,.96);
  box-shadow:var(--shadow);
}
body.v44-polish .comment-label,
body.v44-polish .base-title-v36 span{
  background:#EAF6FC;
  border:1px solid #D0E7F4;
  color:#006DA8;
}

/* cards centrais */
body.v44-polish .chart-card{
  border-radius:26px;
  background:#FFFFFF;
  border:1px solid rgba(220,231,238,.96);
  box-shadow:var(--shadow);
}
body.v44-polish .chart-head{
  background:linear-gradient(180deg,#FFFFFF,#FCFDFE);
}
body.v44-polish .chart-head::before{
  width:6px;
  background:linear-gradient(180deg,#00A3E0,#006DA8);
}
body.v44-polish .chart-head h3{
  font-size:15.5px;
}
body.v44-polish .process-card,
body.v44-polish .priority-row-v33,
body.v44-polish .action-card-v33{
  background:#FBFDFE;
  border-color:#E2ECF2;
}
body.v44-polish .process-card:hover,
body.v44-polish .priority-row-v33:hover,
body.v44-polish .action-card-v33:hover{
  background:#FFFFFF;
  border-color:#C9DEEA;
  box-shadow:0 8px 20px rgba(15,23,42,.035);
}

/* mapa do processo mais refinado */
body.v44-polish .process-card::before{
  height:5px;
  bottom:9px;
  opacity:.92;
}
body.v44-polish .process-card .num{
  font-size:24px;
}
body.v44-polish .stage-critical-badge{
  bottom:13px;
  border-color:#F6C5C5;
}

/* prioridades */
body.v44-polish .priority-row-v33{
  grid-template-columns:42px minmax(0,1fr) auto auto;
  padding:11px 13px;
}
body.v44-polish .priority-rank{
  width:34px;
  height:34px;
  border-radius:13px;
}

/* plano de ação */
body.v44-polish .action-now-v33{
  border-radius:26px;
  border-color:rgba(220,231,238,.96);
  box-shadow:var(--shadow);
}
body.v44-polish .action-title-v33 strong{
  font-size:18px;
}
body.v44-polish .action-card-v33 em{
  color:#006DA8;
}

/* Base de Tratativa */
body.v44-polish #processCardsBase .process-card{
  background:#FFFFFF;
}
body.v44-polish .table-card{
  border-radius:26px;
  border-color:rgba(220,231,238,.96);
  box-shadow:var(--shadow);
}
body.v44-polish .table-head{
  background:linear-gradient(180deg,#FFFFFF,#FCFDFE);
}
body.v44-polish .table-wrap{
  background:#FFFFFF;
}
body.v44-polish thead th{
  background:#F7FAFC;
  color:#536273;
}
body.v44-polish thead th.active-sort{
  background:#EAF6FC;
}
body.v44-polish tbody tr:hover{
  background:#F2F9FD;
}

/* barras de rolagem mais premium */
body.v44-polish *::-webkit-scrollbar{
  height:10px;
  width:10px;
}
body.v44-polish *::-webkit-scrollbar-track{
  background:#F3F7FA;
  border-radius:999px;
}
body.v44-polish *::-webkit-scrollbar-thumb{
  background:#C9D8E2;
  border-radius:999px;
  border:2px solid #F3F7FA;
}
body.v44-polish *::-webkit-scrollbar-thumb:hover{
  background:#AFC4D2;
}

/* microinterações controladas */
body.v44-polish .kpi-card,
body.v44-polish .chart-card,
body.v44-polish .action-now-v33,
body.v44-polish .base-commandbar-v36,
body.v44-polish .table-card{
  animation:v44Up .34s var(--ease) both;
}
@keyframes v44Up{
  from{opacity:.0;transform:translateY(7px)}
  to{opacity:1;transform:translateY(0)}
}

@media(max-width:1280px){
  body.v44-polish .brand-copy-wrap{
    gap:18px;
  }
  body.v44-polish .brand-copy-wrap&gt;div:first-child{
    min-width:300px;
  }
}

@media (prefers-reduced-motion: reduce){
  body.v44-polish *,
  body.v44-polish *::before,
  body.v44-polish *::after{
    animation:none!important;
    transition:none!important;
  }
}


/* =========================================================
   v45 — KPI sem scroll
   Regra principal: KPIs não podem gerar rolagem interna ou horizontal
   ========================================================= */

body.v44-polish .kpi-no-scroll-v45{
  display:grid !important;
  grid-template-columns:repeat(6,minmax(0,1fr)) !important;
  gap:12px !important;
